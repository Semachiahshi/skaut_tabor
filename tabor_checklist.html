<!DOCTYPE html><html lang='cs'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Seznam věcí na tábor</title>
<style>body{font-family:Arial;max-width:800px;margin:40px auto;padding:20px;background:#f5f5f5}li{list-style:none;background:#fff;margin:8px 0;padding:10px;border-radius:8px}label{display:flex;gap:10px;cursor:pointer}.done{text-decoration:line-through;color:#888}</style></head><body><h1>SEZNAM VĚCÍ NA TÁBOR</h1><p>(počet věcí podle uvážení rodičů)</p><ul id='list'></ul><button onclick='resetList()'>Obnovit seznam</button><script>
const items=["Spací pytel","Baterka (nebo čelovka) + náhradní baterie","Botasky a sandály","Gumovky do deště","Spodní prádlo (více kusů)","Plavky","Ponožky (více kusů) + teplé ponožky na spaní","Tepláky, teplákovou bundu","Mikinu nebo svetr (pro chladné noci)","Kraťasy, dlouhé kalhoty","Trička (více kusů)","Ešus (plastový nebo kovový)","Lžíce","Hrníček (plastový nebo kovový)","Utěrka","Láhev na pití (plastová nebo kovová)","Nůž v pouzdru nebo zavírací nůž","Zrcátko","Kartáček a pasta na zuby","Ručník (osuška)","Hřeben","Mýdlo","Šicí potřeby","Brýle proti slunci","Zápisník","Propiska","Tužka","Pastelky","Fixy","Pláštěnka","Batoh (batůžek) na výlet","Oblek na CTH (doba 19. století)","Skautský kroj"];
const ul=document.getElementById('list');
items.forEach((t,i)=>{let li=document.createElement('li');let l=document.createElement('label');let c=document.createElement('input');c.type='checkbox';c.checked=localStorage.getItem(i)==='true';let s=document.createElement('span');s.textContent=t;if(c.checked)s.className='done';c.onchange=()=>{localStorage.setItem(i,c.checked);s.className=c.checked?'done':''};l.append(c,s);li.append(l);ul.append(li);});
function resetList(){localStorage.clear();location.reload();}
</script></body></html>
