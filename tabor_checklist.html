<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seznam věcí na tábor</title>

<style>
    body{
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background:#f5f5f5;
    }

    h1{
        text-align:center;
        margin-bottom:0;
    }

    h2{
        text-align:center;
        margin-top:5px;
        color:#666;
        font-size:18px;
        font-weight:normal;
    }

    ul{
        list-style:none;
        padding:0;
    }

    li{
        background:white;
        margin:8px 0;
        padding:12px;
        border-radius:8px;
        box-shadow:0 1px 3px rgba(0,0,0,.1);
    }

    label{
        cursor:pointer;
        display:flex;
        align-items:center;
        gap:12px;
        font-size:18px;
    }

    input[type="checkbox"]{
        transform:scale(1.4);
    }

    .done{
        text-decoration:line-through;
        color:#888;
    }

    button{
        margin-top:20px;
        padding:10px 20px;
        font-size:16px;
        cursor:pointer;
    }
</style>

</head>
<body>

<h1>SEZNAM VĚCÍ NA TÁBOR</h1>
<h2>(počet věcí podle uvážení rodičů)</h2>

<ul id="list"></ul>

<button onclick="resetList()">Obnovit seznam</button>

<script>

const items = [
"Spací pytel",
"Baterka (nebo čelovka) + náhradní baterie",
"Botasky a sandály",
"Gumovky do deště",
"Spodní prádlo (více kusů)",
"Plavky",
"Ponožky (více kusů) + teplé ponožky na spaní",
"Tepláky, teplákovou bundu",
"Mikinu nebo svetr (pro chladné noci)",
"Kraťasy, dlouhé kalhoty",
"Trička (více kusů)",
"Ešus (plastový nebo kovový)",
"Lžíce",
"Hrníček (plastový nebo kovový)",
"Utěrka",
"Láhev na pití (plastová nebo kovová)",
"Nůž v pouzdru nebo zavírací nůž",
"Zrcátko",
"Kartáček a pasta na zuby",
"Ručník (osuška)",
"Hřeben",
"Mýdlo",
"Šicí potřeby",
"Brýle proti slunci",
"Zápisník",
"Propiska",
"Tužka",
"Pastelky",
"Fixy",
"Pláštěnka",
"Batoh (batůžek) na výlet",
"Oblek na CTH (doba 19. století)",
"Skautský kroj"
];

const list = document.getElementById("list");

items.forEach((item,index)=>{

    const li=document.createElement("li");

    const label=document.createElement("label");

    const check=document.createElement("input");
    check.type="checkbox";

    check.checked=localStorage.getItem("item"+index)==="true";

    const span=document.createElement("span");
    span.textContent=item;

    if(check.checked){
        span.classList.add("done");
    }

    check.addEventListener("change",()=>{
        localStorage.setItem("item"+index,check.checked);
        span.classList.toggle("done",check.checked);
    });

    label.appendChild(check);
    label.appendChild(span);

    li.appendChild(label);
    list.appendChild(li);

});

function resetList(){
    if(confirm("Opravdu chcete vše odškrtnout?")){
        localStorage.clear();
        location.reload();
    }
}

</script>

</body>
</html>
